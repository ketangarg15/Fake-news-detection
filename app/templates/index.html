<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fa;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 50%;
            margin: 60px auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: none;
            font-size: 14px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            display: block;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        .result-box {
            margin-top: 20px;
            background: #f1f1f1;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
        }
        .score {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Fake News Detector</h1>
    <form id="newsForm">
        <textarea name="news_text" placeholder="Paste your news article here..."></textarea>
        <button type="submit">Analyze</button>
    </form>

    <div class="result-box" id="result" style="display: none;">
        <h3 id="verdict"></h3>
        <div class="score" id="scores"></div>
    </div>
</div>

<script>
document.getElementById('newsForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const response = await fetch('/predict', {
        method: 'POST',
        body: formData
    });
    const result = await response.json();
    document.getElementById('result').style.display = 'block';
    document.getElementById('verdict').innerText = result.verdict;
    document.getElementById('scores').innerHTML = `
        <b>Text Model Score:</b> ${result.text_score}<br>
        <b>Style Model Score:</b> ${result.style_score}<br>
        <b>KB Similarity:</b> ${result.kb_similarity}<br>
        <b>Final Score:</b> ${result.final_score}
    `;
});
</script>
</body>
</html>
